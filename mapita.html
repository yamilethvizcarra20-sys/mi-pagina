<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jacqueline Gutierrez">
    <title>Barra de navegación para redes sociales utilizando mapas sensibles en HTML</title>
</head>
<body>
    <center>
        <img src="../img/redes.png" alt="Barra de navegación redes sociales" width="1080" height="155" border="0"
        align="middle" usemap="#mapa0">
    </center>
    <map name="mapa0">
        <area shape="rect" coords="36,42,120,106" href="https://www.youtube.com" alt="Youtube" target="_blank" title="Acceso a Youtube">
        <area shape="circle" coords="230,75,49" href="https://www.twitter.com" alt="Twitter" target="_blank" title="Acceso a Twitter">
        <area shape="rect" coords="342,29,419,114" href="https://www.instagram.com" alt="Instagram" target="_blank" title="Acceso a  Instagram">
        <area shape="circle" coords="545,78,44" href="https://www.facebook.com" alt="Facebook" target="_blank" title="Acceso a Facebook">
        <area shape="circle" coords="691,76,43" href="https://www.pinterest.com" alt="Pinterest" target="_blank" title="Acceso a Pinterest">
        <area shape="circle" coords="841,77,43" href="https://www.whatsapp.com" alt="Whatsapp" target="_blank" title="Acceso a Whatsapp">
        <area shape="circle" coords="984,74,50" href="https://www.messenger.com" alt="Messenger" target="_blank" title="Acceso a Messenger">
    </map>
    
</body>
</html>
